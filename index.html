<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engagement Invitation | Eng. Ahmed & Dr. Rodyna</title>
<meta name="description" content="You are cordially invited to the engagement of Eng. Ahmed & Dr. Rodyna — Saturday, August 8, 2026 at 8:00 PM, Jungle Way.">
<meta property="og:title" content="Engagement Invitation | Ahmed & Rodyna">
<meta property="og:description" content="You are cordially invited to celebrate our engagement — Saturday, August 8, 2026 at 8:00 PM, Jungle Way.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Engagement Invitation | Ahmed & Rodyna">
<meta name="twitter:description" content="You are cordially invited to celebrate our engagement — Saturday, August 8, 2026 at 8:00 PM, Jungle Way.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Tajawal:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory: #fbf8f1;
    --ivory-2: #f3ecdc;
    --gold: #a8802a;
    --gold-deep: #7c5c17;
    --gold-light: #e8d9a6;
    --ink: #241f18;
    --ink-soft: #55493a;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    height:100%;
    background:
      radial-gradient(ellipse 900px 600px at 18% -10%, rgba(214,183,106,0.16), transparent 60%),
      radial-gradient(ellipse 900px 600px at 85% 105%, rgba(214,183,106,0.14), transparent 60%),
      radial-gradient(ellipse at 50% 20%, #ffffff 0%, var(--ivory) 55%, var(--ivory-2) 100%);
    color: var(--ink);
    font-family: 'Jost', sans-serif;
    overflow-x: hidden;
  }

  .arabic{ font-family: 'Tajawal', sans-serif; direction: rtl; }

  .bg-texture{
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image: repeating-linear-gradient(115deg, rgba(182,144,46,0.05) 0px, rgba(182,144,46,0.05) 1px, transparent 1px, transparent 64px);
    box-shadow: inset 0 0 160px rgba(150,120,40,0.08);
  }
  .bg-sheen{
    position: fixed;
    inset: -20% -60%;
    z-index: 0;
    pointer-events: none;
    background: linear-gradient(100deg, transparent 40%, rgba(255,255,255,0.55) 48%, rgba(232,209,140,0.35) 50%, transparent 58%);
    animation: sweepBg 9s ease-in-out infinite;
    mix-blend-mode: soft-light;
  }
  @keyframes sweepBg{
    0%   { transform: translateX(-30%); }
    50%  { transform: translateX(30%); }
    100% { transform: translateX(-30%); }
  }

  .burst{
    position: fixed;
    top: 50%; left: 50%;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,250,235,0.95) 0%, rgba(232,209,140,0.55) 40%, transparent 72%);
    transform: translate(-50%,-50%) scale(0);
    z-index: 40;
    pointer-events: none;
    opacity: 0;
  }
  .burst.go{
    animation: burstOut 1.1s cubic-bezier(.2,.7,.3,1) forwards;
  }
  @keyframes burstOut{
    0%   { opacity: 0.9; transform: translate(-50%,-50%) scale(0); }
    60%  { opacity: 0.6; }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(140); }
  }

  /* ============ INTRO / ENVELOPE ============ */
  #intro{
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse 700px 500px at 12% 8%, rgba(214,183,106,0.22), transparent 60%),
      radial-gradient(ellipse 700px 500px at 88% 92%, rgba(214,183,106,0.2), transparent 60%),
      radial-gradient(ellipse 900px 900px at 50% 45%, #ffffff 0%, var(--ivory) 60%, var(--ivory-2) 100%);
    box-shadow: inset 0 0 22px 4px #fffefb, inset 0 0 140px rgba(150,120,40,0.14);
    cursor: pointer;
    transition: opacity 0.9s ease, visibility 0.9s ease;
    overflow: hidden;
  }
  #intro::before{
    content:'';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(115deg, rgba(168,128,42,0.06) 0px, rgba(168,128,42,0.06) 1px, transparent 1px, transparent 58px);
    pointer-events: none;
  }
  #intro .frame{
    position: absolute;
    inset: 20px;
    border: 1.5px solid var(--gold);
    box-shadow: 0 0 0 5px rgba(232,209,140,0.55), 0 0 0 6px var(--gold);
    pointer-events: none;
  }
  #intro .frame::before,
  #intro .frame::after,
  #intro .corner-tr::before,
  #intro .corner-bl::before{
    content:'';
    position: absolute;
    width: 30px; height: 30px;
    border: 2.4px solid var(--gold-deep);
  }
  #intro .frame::before{ top: -8px; left: -8px; border-width: 2.4px 0 0 2.4px; }
  #intro .frame::after{ bottom: -8px; right: -8px; border-width: 0 2.4px 2.4px 0; }
  #intro .corner-tr{
    position: absolute; top: 12px; right: 12px; width: 30px; height: 30px; pointer-events: none;
  }
  #intro .corner-tr::before{ top: 0; left: 0; border-width: 2.4px 2.4px 0 0; }
  #intro .corner-bl{
    position: absolute; bottom: 12px; left: 12px; width: 30px; height: 30px; pointer-events: none;
  }
  #intro .corner-bl::before{ top: 0; left: 0; border-width: 0 0 2.4px 2.4px; }
  #intro.hidden{
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  #driftField{
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .drift{
    position: absolute;
    color: var(--gold-deep);
    opacity: 0;
    animation: driftFloat 10s ease-in-out infinite;
    pointer-events: none;
  }
  .drift svg{ display:block; filter: drop-shadow(0 0 4px rgba(232,209,140,0.85)); }
  @keyframes driftFloat{
    0%   { opacity: 0; transform: translateY(14px) scale(0.7) rotate(0deg); }
    15%  { opacity: 0.85; }
    50%  { opacity: 1; transform: translateY(-10px) scale(1.15) rotate(20deg); }
    85%  { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-26px) scale(0.7) rotate(35deg); }
  }

  .env-wrap{
    position: relative;
    width: 260px;
    height: 180px;
    perspective: 1000px;
    animation: envRise 1.1s cubic-bezier(.2,.8,.25,1) both, envFloat 4.5s ease-in-out 1.1s infinite;
  }
  @keyframes envRise{
    from{ opacity: 0; transform: translateY(24px) scale(0.94); }
    to{ opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes envFloat{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-6px); }
  }
  #intro.opening .env-wrap{ animation: none; }

  .glow-ring{
    position: absolute;
    left: 50%; top: 50%;
    width: 340px; height: 340px;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,209,140,0.55) 0%, rgba(232,209,140,0.18) 40%, transparent 70%);
    z-index: -1;
    animation: glowPulse 3.2s ease-in-out infinite;
  }
  @keyframes glowPulse{
    0%,100%{ opacity: 0.55; transform: translate(-50%,-50%) scale(0.94); }
    50%{ opacity: 1; transform: translate(-50%,-50%) scale(1.04); }
  }

  .env-body{
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #ffffff, #f6efdd);
    border: 1px solid var(--gold);
    box-shadow:
      0 25px 55px rgba(150,120,40,0.22),
      inset 0 0 0 4px #fffdf7,
      inset 0 0 0 5px var(--gold-light);
    overflow: hidden;
  }
  .env-body::after{
    content:'';
    position:absolute;
    inset: -20% -60%;
    background: linear-gradient(100deg, transparent 42%, rgba(255,255,255,0.9) 49%, rgba(232,209,140,0.6) 51%, transparent 58%);
    animation: sheen 3.6s ease-in-out infinite;
  }
  @keyframes sheen{
    0%   { transform: translateX(-60%); }
    45%,100% { transform: translateX(60%); }
  }

  .env-flap{
    position: absolute;
    top: 0; left: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 130px 108px 130px;
    border-color: transparent transparent var(--ivory-2) transparent;
    transform-origin: top center;
    transform: rotateX(0deg);
    transition: transform 1.15s cubic-bezier(.6,.05,.2,1);
    z-index: 3;
    filter: drop-shadow(0 3px 5px rgba(150,120,40,0.18));
  }
  #intro.opening .env-flap{
    transform: rotateX(180deg);
  }

  .seal-half{
    position: absolute;
    top: 66px;
    left: 50%;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--gold-light), var(--gold) 55%, var(--gold-deep) 100%);
    box-shadow: 0 4px 10px rgba(120,90,20,0.4);
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: #fffdf6;
    transition: transform 0.75s cubic-bezier(.5,0,.2,1), opacity 0.6s ease 0.15s;
  }
  .seal-half.l{ clip-path: inset(0 25px 0 0); transform: translate(-50%,0); }
  .seal-half.r{ clip-path: inset(0 0 0 25px); transform: translate(-50%,0); }
  .seal-half .letter{
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
  }
  .seal-half.l .letter{ left: 11px; }
  .seal-half.r .letter{ right: 9px; }
  #intro.opening .seal-half.l{
    transform: translate(calc(-50% - 20px), 6px) rotate(-18deg);
    opacity: 0;
  }
  #intro.opening .seal-half.r{
    transform: translate(calc(-50% + 20px), 6px) rotate(18deg);
    opacity: 0;
  }

  .letter-card{
    position: absolute;
    left: 50%;
    bottom: 10px;
    width: 210px;
    height: 46px;
    background: linear-gradient(180deg, #fffefb, #fbf5e6);
    border: 1px solid var(--gold-light);
    box-shadow: 0 2px 8px rgba(150,120,40,0.1);
    transform: translate(-50%, 0);
    z-index: 2;
    transition: transform 1.15s cubic-bezier(.5,0,.2,1), opacity 0.6s ease 0.55s;
  }
  .letter-card::before{
    content:'';
    position:absolute;
    top:10px; left:14px; right:14px;
    height:1px;
    background: var(--gold-light);
  }
  .letter-card::after{
    content:'';
    position:absolute;
    top:18px; left:14px; right:30px;
    height:1px;
    background: var(--gold-light);
  }
  #intro.opening .letter-card{
    transform: translate(-50%, -250px) scale(1.08) rotate(-1.5deg);
    opacity: 0;
  }

  .env-hint{
    margin-top: 40px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold-deep);
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:0.6;} 50%{opacity:1;} }

  .env-hint-ar{
    margin-top: 6px;
    font-size: 12px;
    color: var(--ink-soft);
  }

  .env-names{
    margin-top: 20px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 27px;
    color: var(--ink);
    letter-spacing: 1.5px;
  }

  /* ============ MAIN INVITATION ============ */
  .stage{
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 18px;
  }

  .petal-field{
    position: fixed;
    inset: 0;
    z-index: 45;
    pointer-events: none;
    overflow: hidden;
  }
  .petal{
    position: absolute;
    top: -40px;
    color: var(--gold);
    opacity: 0;
    animation: petalFall linear forwards;
  }
  .petal svg{ display:block; filter: drop-shadow(0 1px 2px rgba(124,92,23,0.25)); }
  @keyframes petalFall{
    0%   { opacity: 0; transform: translateY(0) translateX(0) rotate(0deg); }
    8%   { opacity: 0.9; }
    100% { opacity: 0; transform: translateY(105vh) translateX(var(--drift, 40px)) rotate(340deg); }
  }
  .sparkles{
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .spark{
    position: absolute;
    opacity: 0;
    color: var(--gold);
    animation: shimmer 6s ease-in-out infinite;
  }
  .spark svg{ display:block; filter: drop-shadow(0 0 3px rgba(232,209,140,0.7)); }
  @keyframes shimmer{
    0%,100%{ opacity:0; transform: scale(0.5) rotate(0deg); }
    50%{ opacity:0.9; transform: scale(1.15) rotate(25deg); }
  }

  .gems{
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .gem{
    position: absolute;
    opacity: 0.22;
    animation: gemGlint 7s ease-in-out infinite;
  }
  .gem.g1{ top: -40px; left: -50px; width: 260px; animation-delay: 0s; }
  .gem.g2{ bottom: -60px; right: -60px; width: 300px; transform: rotate(18deg); animation-delay: 2.4s; }
  .gem.g3{ top: 38%; right: -70px; width: 190px; transform: rotate(-12deg); animation-delay: 4.6s; }
  @keyframes gemGlint{
    0%,100%{ opacity: 0.18; }
    50%{ opacity: 0.34; }
  }

  .vine{
    position: absolute;
    width: 190px;
    height: 190px;
    opacity: 0;
    z-index: 2;
  }
  .revealed .vine{ animation: vineFade 1.2s ease forwards 0.15s; }
  .vine path{
    fill:none;
    stroke: var(--gold);
    stroke-width: 1.2;
    stroke-linecap: round;
    stroke-dasharray: 500;
    stroke-dashoffset: 500;
  }
  .revealed .vine path{ animation: draw 2.2s ease forwards 0.25s; }
  .vine .leaf{
    fill: var(--gold-light);
    stroke: var(--gold);
    stroke-width: 0.5;
    opacity: 0;
  }
  .revealed .vine .leaf{ animation: leafPop 0.6s ease forwards; }
  .vine.tl{ top: -6px; left: -6px; }
  .vine.br{ bottom: -6px; right: -6px; transform: rotate(180deg); }
  @keyframes vineFade{ to{ opacity: 1; } }
  @keyframes draw{ to{ stroke-dashoffset: 0; } }
  @keyframes leafPop{ from{ opacity:0; transform: scale(0.3);} to{ opacity:0.95; transform: scale(1);} }

  .card{
    position: relative;
    z-index: 3;
    max-width: 580px;
    width: 100%;
    text-align: center;
    padding: 72px 36px 56px;
    border: 1px solid var(--gold);
    border-radius: 2px;
    background: linear-gradient(180deg, #ffffff, #fdfaf2);
    box-shadow:
      0 30px 70px rgba(150,120,40,0.16),
      inset 0 0 0 5px #fffefb,
      inset 0 0 0 6px var(--gold-light);
  }
  .card::after{
    content:'';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(120,95,25,0.5) 0.5px, transparent 0.5px);
    background-size: 3px 3px;
    opacity: 0.05;
    pointer-events: none;
  }
  .card::before{
    content:'';
    position: absolute;
    left: 50%; top: 50%;
    width: 120%; height: 70%;
    transform: translate(-50%,-50%);
    background: radial-gradient(ellipse, rgba(232,209,140,0.35), transparent 70%);
    z-index: -1;
    opacity: 0;
  }
  .revealed .card::before{ animation: haloPulse 4s ease-in-out 2.2s infinite; }
  @keyframes haloPulse{
    0%,100%{ opacity: 0.5; }
    50%{ opacity: 0.9; }
  }
  .corner{
    position: absolute;
    width: 30px; height: 30px;
    border: 1.8px solid var(--gold);
    opacity: 1;
  }
  .corner.tl{ top: 10px; left: 10px; border-width: 1.8px 0 0 1.8px; }
  .corner.tr{ top: 10px; right: 10px; border-width: 1.8px 1.8px 0 0; }
  .corner.bl{ bottom: 10px; left: 10px; border-width: 0 0 1.8px 1.8px; }
  .corner.br{ bottom: 10px; right: 10px; border-width: 0 1.8px 1.8px 0; }

  .crest{
    opacity: 0;
    width: 64px;
    height: 64px;
    margin: 0 auto 22px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--gold-light), var(--gold) 55%, var(--gold-deep) 100%);
    box-shadow: 0 6px 16px rgba(124,92,23,0.35), inset 0 0 0 2px rgba(255,253,246,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: #fffdf6;
  }
  .revealed .crest{ animation: rise 0.9s ease forwards 0.3s; }
  .crest i{ font-style: italic; font-size: 0.7em; opacity: 0.9; }

  .eyebrow{
    opacity: 0;
    letter-spacing: 6px;
    font-size: 14px;
    font-weight: 500;
    color: var(--gold-deep);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .revealed .eyebrow{ animation: rise 0.9s ease forwards 0.5s; }

  .flourish{
    opacity: 0;
    width: 90px;
    height: 22px;
    margin: 0 auto 30px;
  }
  .revealed .flourish{ animation: rise 0.9s ease forwards 0.6s; }
  .flourish svg{ width:100%; height:100%; }
  .flourish path{ fill:none; stroke: var(--gold); stroke-width: 0.8; }

  .names{
    opacity: 0;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(38px, 8.5vw, 58px);
    line-height: 1.3;
    color: var(--ink);
  }
  .revealed .names{ animation: rise 1s ease forwards 0.7s; }
  .names .amp{
    display: block;
    color: var(--gold);
    font-size: 0.5em;
    margin: 4px 0;
    font-style: italic;
  }
  .names .title{
    display: block;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 0.34em;
    color: var(--ink-soft);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .divider{
    opacity: 0;
    width: 120px;
    height: 18px;
    margin: 26px auto;
  }
  .revealed .divider{ animation: rise 0.9s ease forwards 1s; }
  .divider svg{ width:100%; height:100%; }
  .divider path{ stroke: var(--gold); stroke-width: 1; fill:none; }
  .divider circle{ fill: var(--gold); }

  .tagline{
    opacity: 0;
    font-size: 16px;
    line-height: 2;
    color: var(--ink-soft);
    max-width: 380px;
    margin: 0 auto 34px;
    font-weight: 400;
  }
  .revealed .tagline{ animation: rise 0.9s ease forwards 1.2s; }

  .details{
    opacity: 0;
    display: flex;
    flex-direction: column;
    gap: 18px;
    margin-top: 8px;
  }
  .revealed .details{ animation: rise 1s ease forwards 1.5s; }

  .detail-row{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-size: 16.5px;
    font-weight: 400;
    letter-spacing: 0.4px;
    color: var(--ink);
  }
  .detail-row .ic{
    width: 21px;
    height: 21px;
    flex: none;
    stroke: var(--gold-deep);
    fill: none;
    stroke-width: 1.4;
  }
  .detail-row b{
    font-weight: 700;
    color: var(--gold-deep);
    letter-spacing: 0.3px;
  }

  .action-row{
    opacity: 0;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-top: 36px;
  }
  .revealed .action-row{ animation: rise 0.9s ease forwards 1.8s; }
  .revealed .action-row .map-btn{ animation: none; opacity: 1; }

  .map-btn{
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 16px 34px;
    border: 1.5px solid var(--gold);
    border-radius: 2px;
    background: linear-gradient(180deg, #ffffff, #faf3de);
    color: var(--gold-deep);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: background 0.4s ease, color 0.4s ease, box-shadow 0.4s ease, transform 0.3s ease;
  }
  .map-btn:hover{
    background: linear-gradient(180deg, var(--gold), var(--gold-deep));
    color: #fffdf6;
    box-shadow: 0 12px 30px rgba(124,92,23,0.4);
    transform: translateY(-2px);
  }
  .map-btn.ghost{
    background: transparent;
    border-color: var(--gold-light);
    color: var(--ink-soft);
  }
  .map-btn.ghost:hover{
    background: linear-gradient(180deg, var(--gold), var(--gold-deep));
    border-color: var(--gold);
    color: #fffdf6;
  }

  .hairline{
    opacity: 0;
    width: 46px;
    height: 1px;
    margin: 34px auto 0;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .revealed .hairline{ animation: rise 0.9s ease forwards 1.95s; }

  .footer-note{
    opacity: 0;
    margin-top: 14px;
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: 3px;
    color: var(--gold-deep);
    text-transform: uppercase;
  }
  .revealed .footer-note{ animation: rise 0.9s ease forwards 2s; }

  @keyframes rise{
    from{ opacity: 0; transform: translateY(14px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
  }

  @media (max-width: 420px){
    .vine{ width: 130px; height: 130px; }
    .card{ padding: 52px 20px 38px; }
  }
</style>
</head>
<body>

<div class="bg-texture"></div>
<div class="bg-sheen"></div>
<div class="burst" id="burst"></div>
<div class="petal-field" id="petalField"></div>

<!-- INTRO ENVELOPE -->
<div id="intro">
  <div class="frame"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div id="driftField"></div>

  <div class="env-wrap">
    <div class="glow-ring"></div>
    <div class="env-body"></div>
    <div class="letter-card"></div>
    <div class="env-flap"></div>
    <div class="seal-half l"><span class="letter">A</span></div>
    <div class="seal-half r"><span class="letter">R</span></div>
  </div>
  <div class="env-names">Ahmed &amp; Rodyna</div>
  <div class="env-hint">Tap to open</div>
  <div class="env-hint-ar arabic">اضغط لفتح الدعوة</div>
</div>

<!-- MAIN INVITATION -->
<div class="gems">
  <svg class="gem g1" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

      <line x1="74" y1="30" x2="92" y2="44"/>
      <line x1="38" y1="30" x2="30" y2="44"/>
      <line x1="50" y1="6" x2="50" y2="44"/>
      <line x1="62" y1="30" x2="70" y2="44"/>
      <line x1="30" y1="44" x2="50" y2="94"/>
      <line x1="70" y1="44" x2="50" y2="94"/>
    </g>
  </svg>
  <svg class="gem g2" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#a8802a" stroke-width="1.4">
      <polygon points="50,6 74,30 62,30 50,6 38,30 26,30"/>
      <polygon points="26,30 74,30 92,44 8,44"/>
      <polygon points="8,44 92,44 50,94"/>
      <line x1="26" y1="30" x2="8" y2="44"/>
      <line x1="74" y1="30" x2="92" y2="44"/>
      <line x1="38" y1="30" x2="30" y2="44"/>
      <line x1="50" y1="6" x2="50" y2="44"/>
      <line x1="62" y1="30" x2="70" y2="44"/>
      <line x1="30" y1="44" x2="50" y2="94"/>
      <line x1="70" y1="44" x2="50" y2="94"/>
    </g>
  </svg>
  <svg class="gem g3" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#a8802a" stroke-width="1.4">
      <polygon points="50,6 74,30 62,30 50,6 38,30 26,30"/>
      <polygon points="26,30 74,30 92,44 8,44"/>
      <polygon points="8,44 92,44 50,94"/>
      <line x1="26" y1="30" x2="8" y2="44"/>
      <line x1="74" y1="30" x2="92" y2="44"/>
      <line x1="38" y1="30" x2="30" y2="44"/>
      <line x1="50" y1="6" x2="50" y2="44"/>
      <line x1="62" y1="30" x2="70" y2="44"/>
      <line x1="30" y1="44" x2="50" y2="94"/>
      <line x1="70" y1="44" x2="50" y2="94"/>
    </g>
  </svg>
</div>
<div class="sparkles" id="sparkles"></div>

<div class="stage" id="stage">

  <svg class="vine tl" viewBox="0 0 190 190">
    <path d="M5,5 C 40,10 20,60 55,70 C 90,80 70,30 100,25 C 130,20 120,55 150,60"/>
    <ellipse class="leaf" cx="55" cy="70" rx="9" ry="5" transform="rotate(35 55 70)" style="animation-delay:1.1s"/>
    <ellipse class="leaf" cx="100" cy="25" rx="8" ry="4.5" transform="rotate(-20 100 25)" style="animation-delay:1.4s"/>
    <ellipse class="leaf" cx="150" cy="60" rx="7" ry="4" transform="rotate(50 150 60)" style="animation-delay:1.7s"/>
  </svg>

  <svg class="vine br" viewBox="0 0 190 190">
    <path d="M5,5 C 40,10 20,60 55,70 C 90,80 70,30 100,25 C 130,20 120,55 150,60"/>
    <ellipse class="leaf" cx="55" cy="70" rx="9" ry="5" transform="rotate(35 55 70)" style="animation-delay:1.1s"/>
    <ellipse class="leaf" cx="100" cy="25" rx="8" ry="4.5" transform="rotate(-20 100 25)" style="animation-delay:1.4s"/>
    <ellipse class="leaf" cx="150" cy="60" rx="7" ry="4" transform="rotate(50 150 60)" style="animation-delay:1.7s"/>
  </svg>

  <div class="card">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <div class="crest">
      <span>A</span><i>&amp;</i><span>R</span>
    </div>

    <div class="eyebrow arabic">دعوة خطوبة</div>
    <div class="flourish">
      <svg viewBox="0 0 90 22">
        <path d="M2,11 C 20,11 18,4 30,4 C 40,4 38,11 45,11 C 52,11 50,4 60,4 C 72,4 70,11 88,11"/>
      </svg>
    </div>

    <div class="names">
      Eng. Ahmed
      <span class="amp">&amp;</span>
      Dr. Rodyna
    </div>

    <div class="divider">
      <svg viewBox="0 0 120 18">
        <path d="M0,9 H42"/>
        <path d="M60,2 L67,9 L60,16 L53,9 Z" fill="var(--gold)" stroke="none"/>
        <path d="M78,9 H120"/>
      </svg>
    </div>

    <p class="tagline arabic">
      يسعدنا ويشرفنا دعوتكم لمشاركتنا أجمل لحظات العمر<br>
      في حفل خطوبتنا
    </p>

    <div class="details">
      <div class="detail-row">
        <svg class="ic" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="1.5"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
        <span>Saturday, <b>August 8, 2026</b></span>
      </div>
      <div class="detail-row">
        <svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
        <span>At <b>8:00 PM</b></span>
      </div>
      <div class="detail-row">
        <svg class="ic" viewBox="0 0 24 24"><path d="M12 22s7-7.2 7-12.5A7 7 0 0 0 5 9.5C5 14.8 12 22 12 22z"/><circle cx="12" cy="9.5" r="2.5"/></svg>
        <span><b>Jungle Way</b></span>
      </div>
    </div>

    <div class="action-row">
      <a class="map-btn" href="https://maps.app.goo.gl/2afrgWs4VMcS9oARA?g_st=ic" target="_blank" rel="noopener">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 22s7-7.2 7-12.5A7 7 0 0 0 5 9.5C5 14.8 12 22 12 22z"/><circle cx="12" cy="9.5" r="2.3"/></svg>
        View Location
      </a>
      <a class="map-btn ghost" id="calBtn" href="#">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="16" rx="1.5"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
        Add to Calendar
      </a>
    </div>

    <div class="hairline"></div>
    <div class="footer-note arabic">بحضوركم تكتمل فرحتنا</div>
  </div>

</div>

<script>
  const drift = document.getElementById('driftField');
  const driftCount = 16;
  for(let i=0;i<driftCount;i++){
    const d = document.createElement('div');
    d.className = 'drift';
    const size = 12 + Math.random()*12;
    d.innerHTML = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0 C12.8 6.5 13.9 9.6 16.3 11.7 C19 13.4 21.2 13.9 24 12 C21.2 14.1 19 14.6 16.3 16.3 C13.9 18.4 12.8 21.5 12 24 C11.2 21.5 10.1 18.4 7.7 16.3 C5 14.6 2.8 14.1 0 12 C2.8 13.9 5 13.4 7.7 11.7 C10.1 9.6 11.2 6.5 12 0 Z"/></svg>';
    d.style.left = (10 + Math.random()*80) + '%';
    d.style.top = (10 + Math.random()*80) + '%';
    d.style.animationDelay = (Math.random()*10) + 's';
    d.style.animationDuration = (8 + Math.random()*6) + 's';
    drift.appendChild(d);
  }

  const calBtn = document.getElementById('calBtn');
  const calBtnLabel = calBtn.lastChild;
  calBtn.addEventListener('click', (e) => {
    e.preventDefault();
    const ics = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'BEGIN:VEVENT',
      'SUMMARY:Engagement of Eng. Ahmed & Dr. Rodyna',
      'LOCATION:Jungle Way',
      'DTSTART:20260808T200000',
      'DTEND:20260808T230000',
      'DESCRIPTION:You are cordially invited to our engagement celebration.',
      'END:VEVENT',
      'END:VCALENDAR'
    ].join('\r\n');
    const blob = new Blob([ics], { type: 'text/calendar' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Ahmed-Rodyna-Engagement.ics';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

    const original = calBtnLabel.textContent;
    calBtnLabel.textContent = ' Added ✓';
    setTimeout(() => { calBtnLabel.textContent = original; }, 2200);
  });

  const intro = document.getElementById('intro');
  const stage = document.getElementById('stage');
  const burst = document.getElementById('burst');

  intro.addEventListener('click', () => {
    if(intro.classList.contains('opening')) return;
    intro.classList.add('opening');

    setTimeout(() => { burst.classList.add('go'); }, 650);

    setTimeout(() => {
      intro.classList.add('hidden');
      stage.classList.add('revealed');
      startPetalRain();
    }, 950);
  });

  const petalField = document.getElementById('petalField');
  const petalShapes = [
    'M12 0 C 20 4, 22 14, 12 24 C 2 14, 4 4, 12 0 Z',
    'M12 0 C 18 6, 17 16, 12 24 C 7 16, 6 6, 12 0 Z'
  ];
  let petalTimer = null;
  function spawnPetal(){
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 10 + Math.random()*10;
    const shape = petalShapes[Math.floor(Math.random()*petalShapes.length)];
    p.innerHTML = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="currentColor"><path d="'+shape+'"/></svg>';
    p.style.left = (Math.random()*100) + '%';
    p.style.setProperty('--drift', (Math.random()*140 - 70) + 'px');
    const duration = 9 + Math.random()*7;
    p.style.animationDuration = duration + 's';
    p.style.opacity = 0.5 + Math.random()*0.35;
    p.style.transform = 'rotate(' + Math.random()*360 + 'deg)';
    petalField.appendChild(p);
    setTimeout(() => p.remove(), duration * 1000 + 300);
  }
  function startPetalRain(){
    if(petalTimer) return;
    for(let i=0;i<3;i++) setTimeout(spawnPetal, i * 600);
    petalTimer = setInterval(spawnPetal, 1400);
  }

  const field = document.getElementById('sparkles');
  const count = 22;
  const sizes = [10, 14, 18];
  for(let i=0;i<count;i++){
    const s = document.createElement('div');
    s.className = 'spark';
    const size = sizes[Math.floor(Math.random()*sizes.length)];
    s.innerHTML = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0 C12.8 6.5 13.9 9.6 16.3 11.7 C19 13.4 21.2 13.9 24 12 C21.2 14.1 19 14.6 16.3 16.3 C13.9 18.4 12.8 21.5 12 24 C11.2 21.5 10.1 18.4 7.7 16.3 C5 14.6 2.8 14.1 0 12 C2.8 13.9 5 13.4 7.7 11.7 C10.1 9.6 11.2 6.5 12 0 Z"/></svg>';
    s.style.left = (Math.random()*100) + '%';
    s.style.top = (Math.random()*100) + '%';
    s.style.animationDelay = (Math.random()*6) + 's';
    s.style.animationDuration = (5 + Math.random()*4) + 's';
    field.appendChild(s);
  }
</script>

</body>
</html>
